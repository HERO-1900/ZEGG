<style>
  :root{--paper:#EBE4D2;--card:#F4EFE2;--ink:#16120A;--red:#E0382A;--blue:#1450C8;--yellow:#F3C00E;--green:#1E9E86;--violet:#7A3FF2;--orange:#E86A17;--pink:#C81E6E;--shadow:6px 6px 0 var(--ink);--accent:#E0382A;}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:-apple-system,"Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6}
  .topnav{position:sticky;top:0;z-index:30;background:var(--paper);border-bottom:5px solid var(--ink);display:flex;align-items:stretch;justify-content:space-between;flex-wrap:wrap}

  .links{display:flex}.links a{display:flex;align-items:center;padding:0 16px;color:var(--ink);text-decoration:none;font-size:14px;font-weight:800;border-left:3px solid var(--ink)}.links a:hover{background:var(--yellow)}
  @media(max-width:640px){.topnav{flex-direction:column}.brand{border-right:0;border-bottom:4px solid var(--ink)}.links{width:100%}.links a{flex:1;justify-content:center;padding:11px 6px;border-left:0;border-right:3px solid var(--ink)}}

  .sub{font-size:14.5px;font-weight:600;max-width:760px;margin:0}
  .toolbar{max-width:1100px;margin:10px auto 0;padding:0 18px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .toolbar input{border:3px solid var(--ink);padding:7px 11px;font-size:14px;font-weight:700;font-family:inherit;box-shadow:3px 3px 0 var(--ink);min-width:180px}
  .tbtn{background:var(--ink);color:#fff;border:3px solid var(--ink);padding:7px 13px;font-weight:800;font-size:13px;cursor:pointer;box-shadow:3px 3px 0 var(--accent)}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12.5px;font-weight:800;margin-left:auto}
  .legend span{display:inline-flex;align-items:center;gap:5px}.sw{width:14px;height:14px;border:2px solid var(--ink);border-radius:50%}
  .stage{position:relative;max-width:1100px;margin:12px auto;padding:0 18px}
  .canvaswrap{position:relative;border:4px solid var(--ink);box-shadow:var(--shadow);background:#FBF8EF;overflow:hidden;border-radius:4px}
  svg#graph{display:block;width:100%;height:68vh;min-height:460px;touch-action:none;cursor:grab}
  svg#graph.grabbing{cursor:grabbing}
  .hint{position:absolute;left:12px;bottom:10px;font-size:12px;font-weight:700;color:#7a6f54;background:rgba(251,248,239,.85);padding:3px 8px;border:2px solid var(--ink)}
  .zoombtns{position:absolute;right:12px;top:12px;display:flex;flex-direction:column;gap:6px}
  .zoombtns button{width:34px;height:34px;border:3px solid var(--ink);background:#fff;font-weight:900;font-size:17px;cursor:pointer;box-shadow:2px 2px 0 var(--ink)}
  /* side panel */

<script>
/* ====== GRAPH DATA (语文) ====== */
const ACCENT="#E0382A";
const CAT={root:"#16120A",area:"#1450C8",topic:"#F4EFE2",type:"#F3C00E"};
const TXT={root:"#fff",area:"#fff",topic:"#16120A",type:"#16120A"};
const GRAPH={
 nodes:[
  {id:"chin",label:"语文",cat:"root"},
  // 板块
  {id:"a1",label:"现代文阅读",cat:"area"},
  {id:"a2",label:"古诗文",cat:"area"},
  {id:"a3",label:"语言文字运用",cat:"area"},
  {id:"a4",label:"写作",cat:"area"},
  {id:"a5",label:"整本书与文化常识",cat:"area"},
  // 现代文阅读
  {id:"t11",label:"论述类文本",cat:"topic",note:"论点论据论证、信息筛选比对;选项与原文逐句对照,警惕偷换概念、以偏概全、强加因果。"},
  {id:"t12",label:"实用类文本",cat:"topic",note:"非连续性文本、新闻通讯、图表转文字;多则材料比对异同,概括要点分点作答。"},
  {id:"t13",label:"小说三要素",cat:"topic",note:"人物、情节、环境;情节梳理(开端发展高潮结局)、环境描写作用、人物形象概括。"},
  {id:"t14",label:"散文情感与手法",cat:"topic",note:"理清线索抓情感脉络;赏析语言、表现手法、句段作用;由景到情、托物言志。"},
  {id:"t15",label:"标题与赏析手法",cat:"topic",note:"标题含义/作用(线索/双关/主旨);赏析答题=手法+内容+效果+情感。"},
  // 古诗文
  {id:"t21",label:"文言实词虚词",cat:"topic",note:"一词多义、古今异义、词类活用、通假;十八虚词(之乎者也而以于)代入辨义。"},
  {id:"t22",label:"文言句式",cat:"topic",note:"判断句、被动句、倒装句(宾前/定后/状后)、省略句;先识别标志再回归现代语序。"},
  {id:"t23",label:"文言翻译",cat:"topic",note:"直译为主、字字落实;留删补换调,踩准关键实词虚词句式得分点。"},
  {id:"t24",label:"文言断句",cat:"topic",note:"凭虚词(夫盖故/也矣乎哉)、对话(曰云)、对称结构、句首句尾标志断开。"},
  {id:"t25",label:"古诗词鉴赏",cat:"topic",note:"形象(意象意境)、情感、手法(修辞/表现/抒情)、炼字;知人论世,先读懂再赏析。"},
  {id:"t26",label:"名篇名句默写",cat:"topic",note:"理解性默写抓关键词提示;易错字逐字过关,书写规范不写错别字。"},
  // 语言文字运用
  {id:"t31",label:"成语辨析",cat:"topic",note:"辨词义、感情色彩、适用对象、搭配习惯;望文生义、用错对象、褒贬误用是高频坑。"},
  {id:"t32",label:"改病句 ★",cat:"type",pack:"语文改病句.html",trigger:"辨析或修改语病、选择没有语病的一项、给出划线句改写。",action:"缩主干看搭配→扫陷阱词(通过…使/两面对一面/否定失当)→对号入座六类型→删换调补改到位。",trap:"只凭语感不缩句;改动改变了原意。"},
  {id:"t33",label:"标点",cat:"topic",note:"顿号逗号分号冒号、引号问号、破折号省略号;辨析用法与是否多余。"},
  {id:"t34",label:"连贯与补写",cat:"topic",note:"语句衔接排序看话题一致、逻辑顺序、关联呼应;补写句子据上下文照应与逻辑填空。"},
  {id:"t35",label:"压缩语段",cat:"topic",note:"提取关键信息、概括主要内容、拟新闻标题/一句话新闻;抓主干删枝叶限字数。"},
  {id:"t36",label:"仿写与修辞",cat:"topic",note:"比喻拟人排比对偶夸张借代;仿写求句式一致、修辞一致、话题一致、情味一致。"},
  // 写作
  {id:"t41",label:"作文(议论文) ★",cat:"type",pack:"语文作文.html",trigger:"材料作文、任务驱动作文、给定情境写一篇议论文。",action:"审题抓核心概念立意→凤头猪肚豹尾→分论点递进/对照→论证(举例引用对比假设)+分主题素材。",trap:"跑题偏离材料;事例只叙不议;分论点并列堆砌无逻辑。"},
  {id:"t42",label:"记叙文",cat:"topic",note:"以小见大、细节描写、情感真挚;线索清晰、有波澜、结尾点题升华。"},
  {id:"t43",label:"任务驱动",cat:"topic",note:"明确身份对象情境(书信/发言稿/演讲稿);完成具体任务,文体格式规范。"},
  // 整本书与文化常识
  {id:"t51",label:"整本书阅读",cat:"topic",note:"《乡土中国》《红楼梦》等;把握整体框架、核心概念、人物关系与主旨。"},
  {id:"t52",label:"古代文化常识",cat:"topic",note:"官职科举、纪年纪时、礼仪称谓、天文地理;结合文言文语境判断正误。"}
 ],
 links:[
  ["chin","a1"],["chin","a2"],["chin","a3"],["chin","a4"],["chin","a5"],
  ["a1","t11"],["a1","t12"],["a1","t13"],["a1","t14"],["a1","t15"],
  ["a2","t21"],["a2","t22"],["a2","t23"],["a2","t24"],["a2","t25"],["a2","t26"],
  ["a3","t31"],["a3","t32"],["a3","t33"],["a3","t34"],["a3","t35"],["a3","t36"],
  ["a4","t41"],["a4","t42"],["a4","t43"],
  ["a5","t51"],["a5","t52"],
  // cross links
  ["t36","t25"],["t11","t41"],["t31","t32"],["t22","t23"]
 ]
};
/* ====== FORCE-GRAPH ENGINE (reusable, vanilla) ====== */
(function(){
 const svg=document.getElementById('graph');
 const NS="http://www.w3.org/2000/svg";
 const scene=document.createElementNS(NS,'g');svg.appendChild(scene);
 const linkG=document.createElementNS(NS,'g');scene.appendChild(linkG);
 const nodeG=document.createElementNS(NS,'g');scene.appendChild(nodeG);
 const W=1000,H=700,cx=W/2,cy=H/2;
 const R={root:34,area:24,topic:15,type:19};
 const idx={};GRAPH.nodes.forEach(n=>idx[n.id]=n);
 // init positions
 GRAPH.nodes.forEach((n,i)=>{const ang=i/GRAPH.nodes.length*6.283;const rr=n.cat==="root"?0:(n.cat==="area"?160:300);n.x=cx+Math.cos(ang)*rr+(Math.random()*40-20);n.y=cy+Math.sin(ang)*rr+(Math.random()*40-20);n.vx=0;n.vy=0;});
 const links=GRAPH.links.map(l=>({s:idx[l[0]],t:idx[l[1]]}));
 // build SVG elements
 const lineEls=links.map(l=>{const e=document.createElementNS(NS,'line');e.setAttribute('stroke','#16120A');e.setAttribute('stroke-width','2');e.setAttribute('stroke-opacity','.35');linkG.appendChild(e);return e;});
 const nodeEls=GRAPH.nodes.map(n=>{
   const g=document.createElementNS(NS,'g');g.style.cursor='pointer';
   const c=document.createElementNS(NS,'circle');const r=R[n.cat]||14;
   c.setAttribute('r',r);c.setAttribute('fill',CAT[n.cat]);c.setAttribute('stroke','#16120A');c.setAttribute('stroke-width', n.cat==="type"?4:3);
   g.appendChild(c);
   if(n.cat==="type"){const st=document.createElementNS(NS,'text');st.setAttribute('text-anchor','middle');st.setAttribute('y',5);st.setAttribute('font-size','15');st.setAttribute('font-weight','900');st.setAttribute('fill','#16120A');st.textContent='★';st.style.pointerEvents='none';g.appendChild(st);}
   const t=document.createElementNS(NS,'text');t.setAttribute('class','node-label');t.setAttribute('text-anchor','middle');t.setAttribute('y',(R[n.cat]||14)+15);
   t.setAttribute('font-size', n.cat==="root"?17:(n.cat==="area"?14:12));t.setAttribute('fill','#16120A');t.textContent=n.label;g.appendChild(t);
   nodeG.appendChild(g);n._g=g;n._c=c;n._t=t;return g;
 });
 // view transform
 let view={k:1,tx:0,ty:0};
 function applyView(){scene.setAttribute('transform','translate('+view.tx+','+view.ty+') scale('+view.k+')');}
 applyView();
 // simulation
 let alpha=1,frozen=false;
 function tick(){
   if(frozen)return;
   const n=GRAPH.nodes;
   for(let i=0;i<n.length;i++){
     const a=n[i];if(a._fix)continue;
     // gravity to center
     a.vx+=(cx-a.x)*0.002*alpha; a.vy+=(cy-a.y)*0.002*alpha;
     for(let j=0;j<n.length;j++){if(i===j)continue;const b=n[j];let dx=a.x-b.x,dy=a.y-b.y;let d2=dx*dx+dy*dy;if(d2<0.01){d2=0.01;dx=Math.random();dy=Math.random();}const d=Math.sqrt(d2);const rep=2600*alpha/d2;a.vx+=dx/d*rep;a.vy+=dy/d*rep;}
   }
   links.forEach(l=>{const a=l.s,b=l.t;let dx=b.x-a.x,dy=b.y-a.y;let d=Math.sqrt(dx*dx+dy*dy)||0.01;const rest=(a.cat==="root"||b.cat==="root")?150:(a.cat==="area"||b.cat==="area")?110:90;const f=(d-rest)*0.02*alpha;const fx=dx/d*f,fy=dy/d*f;if(!a._fix){a.vx+=fx;a.vy+=fy;}if(!b._fix){b.vx-=fx;b.vy-=fy;}});
   n.forEach(a=>{if(a._fix)return;a.vx*=0.86;a.vy*=0.86;a.x+=a.vx;a.y+=a.vy;});
   alpha*=0.992;if(alpha<0.02)alpha=0.02;
   render();
 }
 function render(){
   links.forEach((l,i)=>{const e=lineEls[i];e.setAttribute('x1',l.s.x);e.setAttribute('y1',l.s.y);e.setAttribute('x2',l.t.x);e.setAttribute('y2',l.t.y);});
   GRAPH.nodes.forEach(nd=>{nd._g.setAttribute('transform','translate('+nd.x+','+nd.y+')');});
 }
 function loop(){tick();requestAnimationFrame(loop);}
 loop();
 // screen->world
 function toWorld(clientX,clientY){const rect=svg.getBoundingClientRect();const sx=(clientX-rect.left)/rect.width*W;const sy=(clientY-rect.top)/rect.height*H;return {x:(sx-view.tx)/view.k,y:(sy-view.ty)/view.k};}
 // node drag + click
 let drag=null,moved=false;
 nodeEls.forEach((g,i)=>{
   const nd=GRAPH.nodes[i];
   g.addEventListener('pointerdown',ev=>{ev.stopPropagation();drag=nd;moved=false;nd._fix=true;alpha=0.6;g.setPointerCapture(ev.pointerId);});
   g.addEventListener('pointermove',ev=>{if(drag!==nd)return;moved=true;const w=toWorld(ev.clientX,ev.clientY);nd.x=w.x;nd.y=w.y;nd.vx=0;nd.vy=0;render();});
   g.addEventListener('pointerup',ev=>{if(drag===nd){nd._fix=false;drag=null;if(!moved)openPanel(nd);}});
 });
 // background pan + zoom
 let pan=null;
 svg.addEventListener('pointerdown',ev=>{pan={x:ev.clientX,y:ev.clientY,tx:view.tx,ty:view.ty};svg.classList.add('grabbing');});
 svg.addEventListener('pointermove',ev=>{if(!pan)return;view.tx=pan.tx+(ev.clientX-pan.x);view.ty=pan.ty+(ev.clientY-pan.y);applyView();});
 window.addEventListener('pointerup',()=>{pan=null;svg.classList.remove('grabbing');});
 svg.addEventListener('wheel',ev=>{ev.preventDefault();const rect=svg.getBoundingClientRect();const mx=(ev.clientX-rect.left)/rect.width*W,my=(ev.clientY-rect.top)/rect.height*H;const f=ev.deltaY<0?1.12:0.89;const nk=Math.max(0.4,Math.min(3,view.k*f));view.tx=mx-(mx-view.tx)*(nk/view.k);view.ty=my-(my-view.ty)*(nk/view.k);view.k=nk;applyView();},{passive:false});
 document.getElementById('zin').onclick=()=>zoomBtn(1.2);
 document.getElementById('zout').onclick=()=>zoomBtn(1/1.2);
 function zoomBtn(f){const nk=Math.max(0.4,Math.min(3,view.k*f));view.tx=cx-(cx-view.tx)*(nk/view.k);view.ty=cy-(cy-view.ty)*(nk/view.k);view.k=nk;applyView();}
 document.getElementById('resetBtn').onclick=()=>{view={k:1,tx:0,ty:0};applyView();alpha=0.8;};
 const fb=document.getElementById('freezeBtn');fb.onclick=()=>{frozen=!frozen;fb.textContent=frozen?'继续布局':'暂停布局';};
 // panel
 const panel=document.getElementById('panel'),pbody=document.getElementById('pbody');
 document.getElementById('pclose').onclick=()=>panel.classList.remove('show');
 function openPanel(nd){
   const catName={root:'学科',area:'板块',topic:'知识点',type:'题型 ★'}[nd.cat];
   let h='<span class="pcat" style="background:'+(nd.cat==="type"?ACCENT:CAT[nd.cat]==="#F4EFE2"?"#9a8f74":CAT[nd.cat])+'">'+catName+'</span>';
   h+='<h3>'+nd.label.replace(' ★','')+'</h3>';
   if(nd.note)h+='<div class="row">'+nd.note+'</div>';
   if(nd.trigger)h+='<div class="trig"><b>触发信号:</b>'+nd.trigger+'</div>';
   if(nd.action)h+='<div class="act"><b>标准动作:</b>'+nd.action+'</div>';
   if(nd.trap)h+='<div class="trp"><b>易错:</b>'+nd.trap+'</div>';
   if(nd.pack)h+='<a class="go" href="'+nd.pack+'">打开攻坚包 →</a>';
   if(!nd.note&&!nd.trigger&&!nd.pack)h+='<div class="row" style="color:#7a6f54">这是一个'+catName+'节点,点击周围的题型 ★ 看具体打法。</div>';
   pbody.innerHTML=h;panel.classList.add('show');
 }

 const search=document.getElementById('search');
 search.addEventListener('input',()=>{const q=search.value.trim();GRAPH.nodes.forEach(nd=>{const hit=q===''||nd.label.indexOf(q)>=0;nd._c.setAttribute('opacity',hit?1:0.18);nd._t.setAttribute('opacity',hit?1:0.18);if(q&&hit){nd._c.setAttribute('stroke','#E0382A');nd._c.setAttribute('stroke-width','5');}else{nd._c.setAttribute('stroke','#16120A');nd._c.setAttribute('stroke-width',nd.cat==="type"?4:3);}});});
