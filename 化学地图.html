   const isLive=!!n.pack;const isTodo=n.cat==="leaf"&&!n.pack;
   if(n.cat==="leaf"){total++;if(isLive)live++;}
   const c=document.createElementNS(NS,'circle');
   let r=n.cat==="root"?R.root:n.cat==="area"?R.area:(isLive?R.leafLive:R.leafTodo);
   c.setAttribute('r',r);
   if(n.cat==="root"){c.setAttribute('fill','#16120A');c.setAttribute('stroke','#16120A');}
   else if(n.cat==="area"){c.setAttribute('fill',ACCENT);c.setAttribute('stroke','#16120A');}
   else if(isLive){c.setAttribute('fill','#F3C00E');c.setAttribute('stroke','#16120A');}
   else{c.setAttribute('fill','#FBF8EF');c.setAttribute('stroke','#b3a880');c.setAttribute('stroke-dasharray','5 4');}
   c.setAttribute('stroke-width',n.cat==="area"?3.5:isLive?4:2.5);
   g.appendChild(c);
   if(isLive){const st=document.createElementNS(NS,'text');st.setAttribute('text-anchor','middle');st.setAttribute('y',5);st.setAttribute('font-size','15');st.setAttribute('font-weight','900');st.setAttribute('fill','#16120A');st.textContent='★';st.style.pointerEvents='none';g.appendChild(st);}
   const t=document.createElementNS(NS,'text');t.setAttribute('class','node-label');t.setAttribute('text-anchor','middle');t.setAttribute('y',r+14);
   t.setAttribute('font-size',n.cat==="root"?18:n.cat==="area"?15:11.5);t.setAttribute('fill',isTodo?'#7a6f54':'#16120A');t.textContent=n.label;g.appendChild(t);
   nodeG.appendChild(g);n._g=g;n._c=c;n._t=t;return g;
 });
 document.getElementById('prog').textContent='已上线 '+live+' / 规划 '+total;
 let view={k:0.82,tx:0,ty:0};
 function applyView(){scene.setAttribute('transform','translate('+view.tx+','+view.ty+') scale('+view.k+')');}
 // center the 0.82 view
 view.tx=cx-cx*view.k;view.ty=cy-cy*view.k;applyView();
 let alpha=1,frozen=false;
 function tick(){
   if(frozen)return;const n=GRAPH.nodes;
   for(let i=0;i<n.length;i++){const a=n[i];if(a.cat==="root"||a._fix)continue;
     if(a.cat==="area"){a.vx+=(a._ax-a.x)*0.045*alpha;a.vy+=(a._ay-a.y)*0.045*alpha;}
     else{const ar=idx[a.cluster];a.vx+=(ar.x-a.x)*0.05*alpha;a.vy+=(ar.y-a.y)*0.05*alpha;}
     for(let j=0;j<n.length;j++){if(i===j)continue;const b=n[j];let dx=a.x-b.x,dy=a.y-b.y;let d2=dx*dx+dy*dy;if(d2<0.01){d2=0.01;dx=Math.random();dy=Math.random();}
       const same=(a.cluster&&a.cluster===b.cluster);const base=same?1500:3200;const d=Math.sqrt(d2);const rep=base*alpha/d2;a.vx+=dx/d*rep;a.vy+=dy/d*rep;}
   }
   links.forEach(l=>{const a=l.s,b=l.t;if(a.cat==="root"||b.cat==="root")return;let dx=b.x-a.x,dy=b.y-a.y;let d=Math.sqrt(dx*dx+dy*dy)||0.01;const rest=70;const f=(d-rest)*0.02*alpha;const fx=dx/d*f,fy=dy/d*f;if(!a._fix&&a.cat!=="root"){a.vx+=fx;a.vy+=fy;}if(!b._fix&&b.cat!=="root"){b.vx-=fx;b.vy-=fy;}});
   n.forEach(a=>{if(a.cat==="root"||a._fix)return;a.vx*=0.85;a.vy*=0.85;a.x+=a.vx;a.y+=a.vy;});
   alpha*=0.992;if(alpha<0.03)alpha=0.03;render();
 }
 function render(){links.forEach((l,i)=>{const e=lineEls[i];e.setAttribute('x1',l.s.x);e.setAttribute('y1',l.s.y);e.setAttribute('x2',l.t.x);e.setAttribute('y2',l.t.y);});GRAPH.nodes.forEach(nd=>{nd._g.setAttribute('transform','translate('+nd.x+','+nd.y+')');});}
 function loop(){tick();requestAnimationFrame(loop);}loop();
 function toWorld(clientX,clientY){const rect=svg.getBoundingClientRect();const sx=(clientX-rect.left)/rect.width*W;const sy=(clientY-rect.top)/rect.height*H;return {x:(sx-view.tx)/view.k,y:(sy-view.ty)/view.k};}
 let drag=null,moved=false;
 nodeEls.forEach((g,i)=>{const nd=GRAPH.nodes[i];
   g.addEventListener('pointerdown',ev=>{ev.stopPropagation();drag=nd;moved=false;nd._fix=true;alpha=0.5;g.setPointerCapture(ev.pointerId);});
   g.addEventListener('pointermove',ev=>{if(drag!==nd)return;moved=true;const w=toWorld(ev.clientX,ev.clientY);nd.x=w.x;nd.y=w.y;nd.vx=0;nd.vy=0;render();});
   g.addEventListener('pointerup',ev=>{if(drag===nd){nd._fix=false;drag=null;if(!moved)openPanel(nd);}});
 });
 let pan=null;
 svg.addEventListener('pointerdown',ev=>{pan={x:ev.clientX,y:ev.clientY,tx:view.tx,ty:view.ty};svg.classList.add('grabbing');});
 svg.addEventListener('pointermove',ev=>{if(!pan)return;view.tx=pan.tx+(ev.clientX-pan.x);view.ty=pan.ty+(ev.clientY-pan.y);applyView();});
 window.addEventListener('pointerup',()=>{pan=null;svg.classList.remove('grabbing');});
 svg.addEventListener('wheel',ev=>{ev.preventDefault();const rect=svg.getBoundingClientRect();const mx=(ev.clientX-rect.left)/rect.width*W,my=(ev.clientY-rect.top)/rect.height*H;const f=ev.deltaY<0?1.12:0.89;const nk=Math.max(0.3,Math.min(3,view.k*f));view.tx=mx-(mx-view.tx)*(nk/view.k);view.ty=my-(my-view.ty)*(nk/view.k);view.k=nk;applyView();},{passive:false});
 document.getElementById('zin').onclick=()=>zoomBtn(1.2);
 document.getElementById('zout').onclick=()=>zoomBtn(1/1.2);
 function zoomBtn(f){const nk=Math.max(0.3,Math.min(3,view.k*f));view.tx=cx-(cx-view.tx)*(nk/view.k);view.ty=cy-(cy-view.ty)*(nk/view.k);view.k=nk;applyView();}
 document.getElementById('resetBtn').onclick=()=>{view={k:0.82,tx:0,ty:0};view.tx=cx-cx*0.82;view.ty=cy-cy*0.82;applyView();alpha=0.7;};
 const fb=document.getElementById('freezeBtn');fb.onclick=()=>{frozen=!frozen;fb.textContent=frozen?'继续布局':'暂停布局';};
 const panel=document.getElementById('panel'),pbody=document.getElementById('pbody');
 document.getElementById('pclose').onclick=()=>panel.classList.remove('show');
 function openPanel(nd){
   const isLive=!!nd.pack,isTodo=nd.cat==="leaf"&&!nd.pack;
   const catName=nd.cat==="root"?'学科':nd.cat==="area"?'板块':isLive?'题型 ★ 已上线':'题型 · 待开发';
   const col=nd.cat==="area"?ACCENT:isLive?'#C8930E':'#9a8f74';
   let h='<span class="pcat" style="background:'+col+'">'+catName+'</span><h3>'+nd.label+'</h3>';
   if(nd.cat==="area"){const kids=GRAPH.nodes.filter(x=>x.cluster===nd.id);const done=kids.filter(x=>x.pack).length;h+='<div class="row">本板块共 '+kids.length+' 个题型,已上线 <b>'+done+'</b> 个。点丛中的节点看详情。</div>';}
   if(nd.note)h+='<div class="row">'+nd.note+'</div>';
   if(nd.trigger)h+='<div class="trig"><b>触发信号:</b>'+nd.trigger+'</div>';
   if(nd.action)h+='<div class="act"><b>标准动作:</b>'+nd.action+'</div>';
   if(isLive)h+='<a class="go" href="'+nd.pack+'">打开攻坚包 →</a>';
   if(isTodo)h+='<div class="soon">⛏ 待开发攻坚包 · 已列入计划,将按周逐个攻克</div>';
   pbody.innerHTML=h;panel.classList.add('show');
 }
 const search=document.getElementById('search');
 search.addEventListener('input',()=>{const q=search.value.trim();GRAPH.nodes.forEach(nd=>{const hit=q===''||nd.label.indexOf(q)>=0;nd._c.setAttribute('opacity',hit?1:0.15);nd._t.setAttribute('opacity',hit?1:0.15);});});
})();
</script>
</body>
