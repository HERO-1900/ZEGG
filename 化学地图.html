  {id:"e2",label:"pH计算",cluster:"E",note:"Kw、酸碱pH、稀释、混合计算。"},
  {id:"e3",label:"盐类水解",cluster:"E",note:"谁弱谁水解、越弱越水解、双水解、应用。"},
  {id:"e4",label:"离子浓度三守恒",cluster:"E",pack:"水溶液离子平衡.html",trigger:"比较离子浓度大小、判断守恒式正误。",action:"抓电离/水解主次→电荷/物料/质子守恒列式。"},
  {id:"e5",label:"沉淀溶解Ksp",cluster:"E",note:"溶度积、沉淀生成转化、Ksp计算。"},
  {id:"e6",label:"中和滴定曲线",cluster:"E",note:"突跃、指示剂选择、滴定曲线点分析。"},
  {id:"f1",label:"原电池原理",cluster:"F",note:"正负极判断、电子离子流向、盐桥。"},

  {id:"f4",label:"新型/燃料电池",cluster:"F",note:"锂电、燃料电池三介质、可充电池充放电。"},
  {id:"f5",label:"电化学计算",cluster:"F",note:"电子守恒、法拉第、串联电路产物量。"},

  {id:"g1",label:"钠及化合物",cluster:"G",note:"Na、Na2O2、NaOH、碳酸钠碳酸氢钠。"},

  {id:"g3",label:"铁盐亚铁盐",cluster:"G",note:"Fe²⁺/Fe³⁺转化与检验、氧化还原。"},
  {id:"g4",label:"镁铜及其他",cluster:"G",note:"Mg、Cu及其盐、焰色反应。"},
  {id:"g5",label:"金属冶炼",cluster:"G",note:"冶炼方法选择、金属活动性顺序应用。"},
  {id:"h1",label:"氯及化合物",cluster:"H",note:"Cl2制备、HClO、漂白、氯水成分。"},
  {id:"h2",label:"硫与硫酸",cluster:"H",note:"SO2性质、浓硫酸特性、硫酸工业。"},
  {id:"h3",label:"氮硝酸与氨",cluster:"H",note:"NO/NO2、硝酸氧化性、氨与铵盐、喷泉。"},
  {id:"h4",label:"碳硅与材料",cluster:"H",note:"CO2/碳酸盐、Si/SiO2、硅酸盐材料。"},
  {id:"h5",label:"非金属推断",cluster:"H",note:"框图推断、气体制备与性质综合。"},
  {id:"i1",label:"结构与命名",cluster:"I",note:"结构简式、官能团、系统命名、同系物。"},
  {id:"i2",label:"烃烷烯炔苯",cluster:"I",note:"取代/加成/氧化、燃烧通式、苯的结构。"},
  {id:"i3",label:"烃的衍生物",cluster:"I",note:"卤代烃醇酚醛羧酸酯的性质与转化。"},
  {id:"i4",label:"同分异构书写",cluster:"I",note:"碳链/位置/官能团异构、限定条件计数。"},

  {id:"i6",label:"有机合成设计",cluster:"I",note:"逆合成分析、引入/转化官能团、保护基。"},

/* ====== GROVE LAYOUT ENGINE (grid of islands + halo) ====== */
(function(){
 const svg=document.getElementById('graph');const NS="http://www.w3.org/2000/svg";
 const bgG=document.createElementNS(NS,'g');svg.appendChild(bgG);
 const linkG=document.createElementNS(NS,'g');svg.appendChild(linkG);
 const nodeG=document.createElementNS(NS,'g');svg.appendChild(nodeG);
 // group leaves by cluster
 const byCluster={};GRAPH.leaves.forEach(l=>{(byCluster[l.cluster]=byCluster[l.cluster]||[]).push(l);});
 // grid
 const n=GRAPH.areas.length;const cols=Math.ceil(Math.sqrt(n*1.35));const rows=Math.ceil(n/cols);
 const CELL_W=430,CELL_H=400,PAD=60;
 const W=cols*CELL_W+PAD*2,H=rows*CELL_H+PAD*2;
 svg.setAttribute('viewBox','0 0 '+W+' '+H);
 const idx={};let live=0,total=0;
 // compute positions
 GRAPH.areas.forEach((a,ai)=>{
   const col=ai%cols,row=Math.floor(ai/cols);
   a.x=PAD+col*CELL_W+CELL_W/2; a.y=PAD+row*CELL_H+CELL_H/2; a.isArea=true; idx[a.id]=a;
   const kids=byCluster[a.id]||[];const L=kids.length;
   const halo=Math.min(160,92+L*7);a._halo=halo;
   kids.forEach((k,ki)=>{
     const ang=-Math.PI/2+ki/L*2*Math.PI;
     k.x=a.x+Math.cos(ang)*halo; k.y=a.y+Math.sin(ang)*halo; k._ang=ang; idx[k.id]=k;
     total++; if(k.pack)live++;
   });
 });
 document.getElementById('prog').textContent='已上线 '+live+' / 规划 '+total;
 // draw grove background discs + area→leaf links
 const lineEls=[];
 GRAPH.areas.forEach(a=>{
   const bg=document.createElementNS(NS,'circle');bg.setAttribute('cx',a.x);bg.setAttribute('cy',a.y);bg.setAttribute('r',a._halo+46);
   bg.setAttribute('fill',ACCENT);bg.setAttribute('fill-opacity','0.07');bg.setAttribute('stroke',ACCENT);bg.setAttribute('stroke-opacity','0.35');bg.setAttribute('stroke-width','2');bg.setAttribute('stroke-dasharray','3 6');bgG.appendChild(bg);a._bg=bg;
   (byCluster[a.id]||[]).forEach(k=>{const e=document.createElementNS(NS,'line');e.setAttribute('x1',a.x);e.setAttribute('y1',a.y);e.setAttribute('x2',k.x);e.setAttribute('y2',k.y);e.setAttribute('stroke','#16120A');e.setAttribute('stroke-width','1.6');e.setAttribute('stroke-opacity','.3');linkG.appendChild(e);lineEls.push({e:e,a:a,k:k});});
 });
 // draw nodes
 function mkNode(d,isArea){
   const g=document.createElementNS(NS,'g');g.style.cursor='pointer';
   const isLive=!!d.pack;
   const r=isArea?30:(isLive?17:13);
   const c=document.createElementNS(NS,'circle');c.setAttribute('r',r);
   if(isArea){c.setAttribute('fill',ACCENT);c.setAttribute('stroke','#16120A');c.setAttribute('stroke-width','4');}
   else if(isLive){c.setAttribute('fill','#F3C00E');c.setAttribute('stroke','#16120A');c.setAttribute('stroke-width','4');}
   else{c.setAttribute('fill','#FBF8EF');c.setAttribute('stroke','#b3a880');c.setAttribute('stroke-width','2.5');c.setAttribute('stroke-dasharray','5 4');}
   g.appendChild(c);
   if(isLive){const st=document.createElementNS(NS,'text');st.setAttribute('text-anchor','middle');st.setAttribute('y',5.5);st.setAttribute('font-size','16');st.setAttribute('font-weight','900');st.setAttribute('fill','#16120A');st.textContent='★';st.style.pointerEvents='none';g.appendChild(st);}
   const t=document.createElementNS(NS,'text');t.setAttribute('class','nl');t.setAttribute('text-anchor','middle');
   if(isArea){t.setAttribute('y',-r-9);t.setAttribute('font-size','17');t.setAttribute('fill','#16120A');}
   else{
     // place label outward from hub to avoid overlap
     const a=idx[d.cluster];const outAng=d._ang;const oy=Math.sin(outAng);
     if(oy>0.35){t.setAttribute('y',r+15);} else {t.setAttribute('y',-r-7);}
     t.setAttribute('font-size','12.5');t.setAttribute('fill',isLive?'#16120A':'#6b5d3a');
   }
   t.textContent=d.label;g.appendChild(t);
   g.setAttribute('transform','translate('+d.x+','+d.y+')');
   nodeG.appendChild(g);d._g=g;d._c=c;d._t=t;
   g.addEventListener('pointerdown',ev=>{ev.stopPropagation();startDrag(d,ev,g);});
   return g;
 }
 GRAPH.areas.forEach(a=>mkNode(a,true));
 GRAPH.leaves.forEach(l=>mkNode(l,false));
 // view transform
 let view={k:1,tx:0,ty:0};
 function applyView(){nodeG.setAttribute('transform','translate('+view.tx+','+view.ty+') scale('+view.k+')');linkG.setAttribute('transform','translate('+view.tx+','+view.ty+') scale('+view.k+')');bgG.setAttribute('transform','translate('+view.tx+','+view.ty+') scale('+view.k+')');}
 applyView();
 function toWorld(cx,cy){const rect=svg.getBoundingClientRect();
   // account for preserveAspectRatio meet scaling
   const scale=Math.min(rect.width/W,rect.height/H);const offX=(rect.width-W*scale)/2,offY=(rect.height-H*scale)/2;
   const sx=(cx-rect.left-offX)/scale, sy=(cy-rect.top-offY)/scale;
   return {x:(sx-view.tx)/view.k,y:(sy-view.ty)/view.k};
 }
 // dragging nodes
 let drag=null,moved=false;
 function startDrag(d,ev,g){drag=d;moved=false;try{g.setPointerCapture(ev.pointerId);}catch(e){}}
 svg.addEventListener('pointermove',ev=>{
   if(drag){moved=true;const w=toWorld(ev.clientX,ev.clientY);drag.x=w.x;drag.y=w.y;updateNode(drag);if(drag.isArea){/* move whole island */}return;}
   if(pan){view.tx=pan.tx+(ev.clientX-pan.x);view.ty=pan.ty+(ev.clientY-pan.y);applyView();}
 });
 window.addEventListener('pointerup',ev=>{
   if(drag){if(!moved)openPanel(drag);drag=null;}
   if(pan){pan=null;svg.classList.remove('grabbing');}
 });
 function updateNode(d){
   d._g.setAttribute('transform','translate('+d.x+','+d.y+')');
   if(d.isArea){d._bg.setAttribute('cx',d.x);d._bg.setAttribute('cy',d.y);}
   lineEls.forEach(o=>{if(o.a===d||o.k===d){o.e.setAttribute('x1',o.a.x);o.e.setAttribute('y1',o.a.y);o.e.setAttribute('x2',o.k.x);o.e.setAttribute('y2',o.k.y);}});
 }
 // background pan
 let pan=null;
 svg.addEventListener('pointerdown',ev=>{if(drag)return;pan={x:ev.clientX,y:ev.clientY,tx:view.tx,ty:view.ty};svg.classList.add('grabbing');});
 svg.addEventListener('wheel',ev=>{ev.preventDefault();const rect=svg.getBoundingClientRect();const scale=Math.min(rect.width/W,rect.height/H);const offX=(rect.width-W*scale)/2,offY=(rect.height-H*scale)/2;const mx=(ev.clientX-rect.left-offX)/scale,my=(ev.clientY-rect.top-offY)/scale;const f=ev.deltaY<0?1.15:0.87;const nk=Math.max(0.5,Math.min(4,view.k*f));view.tx=mx-(mx-view.tx)*(nk/view.k);view.ty=my-(my-view.ty)*(nk/view.k);view.k=nk;applyView();},{passive:false});
 document.getElementById('zin').onclick=()=>zb(1.25);document.getElementById('zout').onclick=()=>zb(1/1.25);
 function zb(f){const cx=W/2,cy=H/2;const nk=Math.max(0.5,Math.min(4,view.k*f));view.tx=cx-(cx-view.tx)*(nk/view.k);view.ty=cy-(cy-view.ty)*(nk/view.k);view.k=nk;applyView();}
 document.getElementById('resetBtn').onclick=()=>{view={k:1,tx:0,ty:0};applyView();};
 // panel
 const panel=document.getElementById('panel'),pbody=document.getElementById('pbody');
 document.getElementById('pclose').onclick=()=>panel.classList.remove('show');
 function openPanel(d){
   const isLive=!!d.pack,isTodo=!d.isArea&&!d.pack;
   const catName=d.isArea?'板块':isLive?'题型 ★ 已上线':'题型 · 待开发';
   const col=d.isArea?ACCENT:isLive?'#C8930E':'#9a8f74';
   let h='<span class="pcat" style="background:'+col+'">'+catName+'</span><h3>'+d.label+'</h3>';
   if(d.isArea){const kids=byCluster[d.id]||[];const done=kids.filter(x=>x.pack).length;h+='<div class="row">本板块共 '+kids.length+' 个题型,已上线 <b>'+done+'</b> 个。点岛上的节点看详情。</div>';}
   if(d.note)h+='<div class="row">'+d.note+'</div>';
   if(d.trigger)h+='<div class="trig"><b>触发信号:</b>'+d.trigger+'</div>';
   if(d.action)h+='<div class="act"><b>标准动作:</b>'+d.action+'</div>';
   if(isLive)h+='<a class="go" href="'+d.pack+'">打开攻坚包 →</a>';
   if(isTodo)h+='<div class="soon">⛏ 待开发攻坚包 · 已列入计划,将按周逐个攻克</div>';
   pbody.innerHTML=h;panel.classList.add('show');
 }
 // search
 const search=document.getElementById('search');
 const all=GRAPH.areas.concat(GRAPH.leaves);
 search.addEventListener('input',()=>{const q=search.value.trim();all.forEach(d=>{const hit=q===''||d.label.indexOf(q)>=0;d._c.setAttribute('opacity',hit?1:0.12);d._t.setAttribute('opacity',hit?1:0.12);if(q&&hit&&!d.isArea){d._c.setAttribute('stroke','#E0382A');}else if(!d.isArea){d._c.setAttribute('stroke',d.pack?'#16120A':'#b3a880');}});});
})();
</script>
</body>
