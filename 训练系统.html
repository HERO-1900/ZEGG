  if(kind==="ok"){ r.rc=Math.min((r.rc||0)+1,INTERVALS.length-1); r.st=(r.rc>=INTERVALS.length-1)?"review":"review"; r.due=today()+INTERVALS[r.rc]*DAY; r.ts=today(); }
  else if(kind==="no"){ r.rc=0; r.st="learning"; r.due=today()+INTERVALS[0]*DAY; r.ts=today(); }
  else if(kind==="master"){ r.st="mastered"; r.due=0; r.ts=today(); }
  else if(kind==="reset"){ delete ST[p]; save(ST); renderAll(); return; }
  ST[p]=r; save(ST); renderAll();
}
function isDue(p){ var r=rec(p); return r.st!=="mastered" && r.st!=="new" && r.due && r.due<=today(); }
function statOf(p){ return rec(p).st; }
function renderStats(){
  var c={new:0,learning:0,review:0,mastered:0};
  PACKS.forEach(function(x){ c[statOf(x.p)]++; });
  var tot=PACKS.length;
  el("stats").innerHTML='<span class="stat">共 '+tot+' 包</span>'+
    '<span class="stat b-new">未学 '+c.new+'</span>'+
    '<span class="stat b-learning">学习中 '+c.learning+'</span>'+
    '<span class="stat b-review">复习中 '+c.review+'</span>'+
    '<span class="stat b-mastered">已掌握 '+c.mastered+'</span>';
  var pm=Math.round(c.mastered/tot*100),pr=Math.round(c.review/tot*100),pl=Math.round(c.learning/tot*100);
  el("prog").innerHTML='<i style="width:'+pm+'%;background:var(--green)"></i><i style="width:'+pr+'%;background:var(--orange)"></i><i style="width:'+pl+'%;background:var(--yellow)"></i>';
}
function cardBtns(p){
  return '<a class="mini go" href="'+encodeURI(p)+'">去训练 ▶</a>'+
    '<span class="mini ok" onclick="mark(\''+p.replace(/'/g,"")+'\',\'ok\')">记住了</span>'+
    '<span class="mini no" onclick="mark(\''+p.replace(/'/g,"")+'\',\'no\')">还没会</span>'+
    '<span class="mini mo" onclick="mark(\''+p.replace(/'/g,"")+'\',\'master\')">已掌握</span>';
}
function tcard(x){
  var r=rec(x.p); var due=isDue(x.p);
  var nb=""; if(r.due && r.st!=="mastered" && r.st!=="new"){ var days=Math.round((r.due-today())/DAY); nb=due?'<span style="color:var(--accent);font-weight:800"> · 今天该复习</span>':'<span style="color:#6b5d3a"> · '+days+'天后复习</span>'; }
  return '<div class="tcard"><div class="tg">'+esc(SN[x.sid])+' · '+esc(x.cn)+'</div><h3>'+esc(x.l)+'<span class="badge b-'+r.st+'">'+STN[r.st]+'</span></h3><div style="font-size:12px;color:#6b5d3a">'+esc(x.t)+nb+'</div>'+cardBtns(x.p)+'</div>';
}
function renderDue(){
  var due=PACKS.filter(function(x){ return isDue(x.p); });
  el("dueCount").textContent="("+due.length+")";
  if(!due.length){ el("due").innerHTML='<p class="empty">🎉 今天没有到期复习的题型。去随机练一个,或从下面标记新题型吧。</p>'; return; }
  el("due").innerHTML=due.map(tcard).join("");
}
function renderList(){
  var q=el("q").value.trim(), fs=el("fsub").value, ft=el("fst").value;
  var list=PACKS.filter(function(x){
    if(fs && x.sid!==fs) return false;
    if(ft && statOf(x.p)!==ft) return false;
    if(q && (x.l+x.t).indexOf(q)<0) return false;
    return true;
  });
  var order=["chem","phys","bio","math","eng","chin"]; var h="";
  order.forEach(function(sid){
    var g=list.filter(function(x){ return x.sid===sid; });
    if(!g.length) return;
    h+='<div class="subhd">'+SN[sid]+' <span style="font-size:13px;font-weight:700;color:#6b5d3a">('+g.length+')</span></div><div class="grid">'+g.map(tcard).join("")+'</div>';
  });
  el("all").innerHTML=h||'<p class="empty">没有匹配的题型。</p>';
}
function renderAll(){ renderStats(); renderDue(); renderList(); }
function randomFrom(pool){
  if(!pool.length){ el("randOut").innerHTML='<p class="empty">这个范围没有可练的包。</p>'; return; }
  var x=pool[Math.floor(Math.random()*pool.length)];
  el("randOut").innerHTML='<div class="tcard" style="border-color:var(--violet)"><div class="tg">'+esc(SN[x.sid])+' · '+esc(x.cn)+'</div><h3>🎯 '+esc(x.l)+'</h3><div style="font-size:12px;color:#6b5d3a">'+esc(x.t)+'</div>'+cardBtns(x.p)+'</div>';
}
function randomOne(){ var fs=el("rsub").value; randomFrom(PACKS.filter(function(x){return !fs||x.sid===fs;})); }
function randomWeak(){ var fs=el("rsub").value; randomFrom(PACKS.filter(function(x){ if(fs&&x.sid!==fs)return false; var s=statOf(x.p); return isDue(x.p)||s==="learning"; })); }
function resetAll(){ if(confirm("确定清空全部训练进度?此操作不可撤销。")){ ST={}; save(ST); renderAll(); } }
window.addEventListener("DOMContentLoaded",function(){
  el("q").addEventListener("input",renderList);
  el("fsub").addEventListener("change",renderList);
  el("fst").addEventListener("change",renderList);
  renderAll();
});
</script></body></html>
