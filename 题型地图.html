<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>题型地图 · 六科知识总图 | thebest2dan</title>
<style>
  :root{--paper:#EBE4D2;--card:#F4EFE2;--ink:#16120A;--red:#E0382A;--blue:#1450C8;--yellow:#F3C00E;--green:#1E9E86;--violet:#7A3FF2;--orange:#E86A17;--pink:#C81E6E;--shadow:6px 6px 0 var(--ink);--accent:#E0382A;}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:-apple-system,"Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6}
  .topnav{position:sticky;top:0;z-index:30;background:var(--paper);border-bottom:5px solid var(--ink);display:flex;align-items:stretch;justify-content:space-between;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px;padding:12px 18px;text-decoration:none;color:var(--ink);border-right:5px solid var(--ink)}
  .logomark{width:38px;height:38px;background:var(--ink);border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}.logomark svg{width:24px;height:24px}.brand b{font-size:21px;font-weight:900;letter-spacing:-.5px}
  .links{display:flex}.links a{display:flex;align-items:center;padding:0 16px;color:var(--ink);text-decoration:none;font-size:14px;font-weight:800;border-left:3px solid var(--ink)}.links a:hover{background:var(--yellow)}
  @media(max-width:640px){.topnav{flex-direction:column}.brand{border-right:0;border-bottom:4px solid var(--ink)}.links{width:100%}.links a{flex:1;justify-content:center;padding:11px 6px;border-left:0;border-right:3px solid var(--ink)}}
  .hd{max-width:1180px;margin:0 auto;padding:16px 18px 6px}
  .kicker{display:inline-block;background:var(--accent);color:#fff;font-weight:900;font-size:12px;letter-spacing:2px;padding:5px 12px;text-transform:uppercase;border:3px solid var(--ink)}
  h1{font-size:27px;font-weight:900;letter-spacing:-1px;margin:8px 0 4px}
  .sub{font-size:14.5px;font-weight:600;max-width:820px;margin:0}
  .chipsrow{max-width:1180px;margin:10px auto 0;padding:0 18px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .jump{border:3px solid var(--ink);padding:6px 12px;font-weight:800;font-size:13px;cursor:pointer;text-decoration:none;color:#fff;box-shadow:3px 3px 0 var(--ink)}
  .toolbar{max-width:1180px;margin:8px auto 0;padding:0 18px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .toolbar input{border:3px solid var(--ink);padding:7px 11px;font-size:14px;font-weight:700;font-family:inherit;box-shadow:3px 3px 0 var(--ink);min-width:180px}
  .tbtn{background:var(--ink);color:#fff;border:3px solid var(--ink);padding:7px 13px;font-weight:800;font-size:13px;cursor:pointer;box-shadow:3px 3px 0 var(--accent)}
  .stage{position:relative;max-width:1180px;margin:12px auto;padding:0 18px}
  .canvaswrap{position:relative;border:4px solid var(--ink);box-shadow:var(--shadow);background:#FBF8EF;overflow:hidden;border-radius:4px}
  svg#graph{display:block;width:100%;height:78vh;min-height:540px;touch-action:none;cursor:grab}
  svg#graph.grabbing{cursor:grabbing}
  .hint{position:absolute;left:12px;bottom:10px;font-size:12px;font-weight:700;color:#7a6f54;background:rgba(251,248,239,.85);padding:3px 8px;border:2px solid var(--ink)}
  .zoombtns{position:absolute;right:12px;top:12px;display:flex;flex-direction:column;gap:6px}
  .zoombtns button{width:34px;height:34px;border:3px solid var(--ink);background:#fff;font-weight:900;font-size:17px;cursor:pointer;box-shadow:2px 2px 0 var(--ink)}
  .panel{position:absolute;top:12px;right:12px;width:300px;max-width:80%;background:#fff;border:4px solid var(--ink);box-shadow:var(--shadow);padding:14px 16px;display:none;z-index:5}
  .panel.show{display:block}
  .panel .pcat{display:inline-block;font-size:11px;font-weight:900;letter-spacing:1px;padding:2px 8px;border:2px solid var(--ink);color:#fff;text-transform:uppercase}
  .panel h3{font-size:19px;font-weight:900;margin:8px 0 6px}
  .panel .row{font-size:13.5px;font-weight:600;margin:7px 0}.panel .row b{font-weight:900}
  .panel .trig{border-left:8px solid var(--blue);background:#F4EFE2;border:2px solid var(--ink);padding:6px 10px;margin:6px 0;font-size:13px}
  .panel .act{border-left:8px solid var(--green);background:#F4EFE2;border:2px solid var(--ink);padding:6px 10px;margin:6px 0;font-size:13px}
  .panel a.go{display:inline-block;margin-top:8px;color:#fff;border:3px solid var(--ink);padding:7px 13px;font-weight:900;font-size:13px;text-decoration:none;box-shadow:3px 3px 0 var(--ink)}
  .panel .x{position:absolute;top:8px;right:10px;font-weight:900;cursor:pointer;font-size:18px;border:none;background:none}
  .nl{font-weight:800;pointer-events:none;paint-order:stroke;stroke:#FBF8EF;stroke-width:3.5px;stroke-linejoin:round}
  .foot{max-width:1180px;margin:0 auto;padding:8px 18px 60px;font-size:12.5px;font-weight:700;color:#6b5d3a}
</style>
</head>
<body>
  <nav class="topnav">
    <a class="brand" href="index.html"><span class="logomark"><svg viewBox="0 0 24 24" fill="none"><g stroke="#F3C00E" stroke-width="3.4" stroke-linecap="round"><line x1="12" y1="3.5" x2="12" y2="20.5"/><line x1="3.5" y1="12" x2="20.5" y2="12"/><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></g></svg></span><b>thebest2dan</b></a>
    <div class="links"><a href="index.html">首页</a><a href="index.html#packs">攻坚包</a></div>
  </nav>
  <div class="hd">
    <div class="kicker">六科 · 知识总图</div>
    <h1>题型地图 · 六科总览</h1>
    <p class="sub">把语数英物化生连成一张活的网:拖动节点会牵动整张图。点<b>学科</b>节点进入该科<b>完整知识图谱</b>;点 ★ 直达攻坚包;红色虚线=跨学科联系。下面也可一键直达分科图。</p>
  </div>
  <div class="chipsrow" id="jumps"></div>
  <div class="toolbar">
    <input id="search" placeholder="🔍 搜学科 / 题型…" autocomplete="off">
    <button class="tbtn" id="resetBtn">复位 / 重排</button>
  </div>
  <div class="stage">
    <div class="canvaswrap">
      <svg id="graph" viewBox="0 0 1500 1080"></svg>
      <div class="zoombtns"><button id="zin">＋</button><button id="zout">－</button></div>
      <div class="hint">拖节点扯动整张网 · 滚轮缩放 · 点学科进分科图</div>
      <div class="panel" id="panel"><button class="x" id="pclose">×</button><div id="pbody"></div></div>
    </div>
  </div>
  <div class="foot">thebest2dan · 六科题型总图 · 学科→完整知识图谱;★→可交互攻坚包</div>

<script>
const SUBJ={chem:"#1E9E86",phys:"#1450C8",bio:"#7A3FF2",math:"#E86A17",eng:"#0E9AA7",chin:"#E0382A"};
const AREAS=[
 {id:"chem",label:"化学",color:SUBJ.chem,map:"化学地图.html"},
 {id:"phys",label:"物理",color:SUBJ.phys,map:"物理地图.html"},
 {id:"bio",label:"生物",color:SUBJ.bio,map:"生物地图.html"},
 {id:"math",label:"数学",color:SUBJ.math,map:"数学地图.html"},
 {id:"eng",label:"英语",color:SUBJ.eng,map:"英语地图.html"},
 {id:"chin",label:"语文",color:SUBJ.chin,map:"语文地图.html"}
];
const LEAVES=[
 {id:"c_eq",label:"化学平衡",cluster:"chem",pack:"化学平衡.html",trigger:"可逆⇌、移动方向、转化率、K、图像。",action:"勒夏特列→三段式→比较Q与K;先拐先平。"},
 {id:"c_ec",label:"电化学",cluster:"chem",pack:"电化学.html",trigger:"原电池/电解池、电极式、放电顺序。",action:"判氧化还原极→按介质写电极式→电子守恒。"},
 {id:"c_aq",label:"水溶液离子",cluster:"chem",pack:"水溶液离子平衡.html",trigger:"pH、水解、滴定、离子浓度、Ksp。",action:"抓电离/水解→三大守恒→比较浓度。"},
 {id:"c_org",label:"有机推断",cluster:"chem",pack:"有机推断.html",trigger:"分子式+现象推结构、转化框图、同分异构。",action:"算不饱和度→认官能团→转化网络→数异构。"},
 {id:"c_exp",label:"实验/工艺",cluster:"chem",pack:"化学实验.html",trigger:"滴定误差、工艺流程。",action:"V标大小判误差;流程认环节问目的。"},
 {id:"p_em",label:"电磁感应",cluster:"phys",pack:"电磁感应.html",trigger:"磁通变化、感应电流方向、EMF。",action:"楞次定律来拒去留→ε=NΔΦ/Δt或BLv。"},
 {id:"p_mp",label:"多过程/能量动量",cluster:"phys",pack:"物理多过程.html",trigger:"碰撞+后续运动、滑块木板。",action:"分段→选锅(动量/能量)→速度衔接。"},
 {id:"p_ex",label:"电学实验",cluster:"phys",pack:"物理电学实验.html",trigger:"内外接、分压限流、测电动势内阻、读数。",action:"大内偏大小外偏小;U-I图纵截距=ε斜率=r。"},
 {id:"b_gen",label:"遗传计算",cluster:"bio",pack:"遗传计算.html",trigger:"分离/自由组合、概率、系谱、伴性。",action:"分步分类相乘相加;系谱口诀定显隐。"},
 {id:"b_ps",label:"光合呼吸",cluster:"bio",pack:"光合呼吸.html",trigger:"光合呼吸速率、曲线、补偿/饱和点。",action:"真光合=净光合+呼吸;限制因子判断。"},
 {id:"m_der",label:"导数压轴",cluster:"math",pack:"数学压轴.html",trigger:"含参单调极值、零点、不等式、排列组合。",action:"求导讨论;双极值比值换元;三大法。"},
 {id:"m_st",label:"状态转移",cluster:"math",pack:"数学状态转移.html",trigger:"新定义、概率递推、马尔科夫、逆向。",action:"构造等比;不动点法;正难则反补集。"},
 {id:"e_wr",label:"小作文",cluster:"eng",pack:"英语作文.html",trigger:"应用文(邀请/建议/通知…)。",action:"三段骨架+高级句式+连接词。"},
 {id:"e_cont",label:"读后续写",cluster:"eng",pack:"读后续写.html",trigger:"给短文+两段首句续写。",action:"顺情绪弧;动作慢镜头+五感;回收伏笔。"},
 {id:"z_bing",label:"改病句",cluster:"chin",pack:"语文改病句.html",trigger:"辨析/修改语病。",action:"缩主干看搭配→扫陷阱词→对号入座六类型。"},
 {id:"z_zw",label:"议论文",cluster:"chin",pack:"语文作文.html",trigger:"材料/话题作文。",action:"审题立意→凤头猪肚豹尾→分论点+论证+素材。"}
];
const CROSS=[["math","phys"],["chem","bio"],["eng","chin"],["m_der","p_mp"],["c_org","b_gen"]];
/* ====== LIVE FORCE ENGINE ====== */
(function(){
 const svg=document.getElementById('graph');const NS="http://www.w3.org/2000/svg";
 const scene=document.createElementNS(NS,'g');svg.appendChild(scene);
 const linkG=document.createElementNS(NS,'g');scene.appendChild(linkG);
 const nodeG=document.createElementNS(NS,'g');scene.appendChild(nodeG);
 const W=1500,H=1080,cx=W/2,cy=H/2;
 const nodes=[],idx={};
 const root={id:"__root",label:"六科 · 题型地图",cat:"root"};nodes.push(root);idx[root.id]=root;root.x=cx;root.y=cy;root.vx=0;root.vy=0;
 const na=AREAS.length;
 AREAS.forEach((a,i)=>{a.cat="area";const ang=-Math.PI/2+i/na*2*Math.PI;a.x=cx+Math.cos(ang)*400;a.y=cy+Math.sin(ang)*400;a.vx=0;a.vy=0;nodes.push(a);idx[a.id]=a;});
 const byC={};
 LEAVES.forEach(l=>{l.cat="leaf";const a=idx[l.cluster];const ang=Math.random()*6.283;l.x=a.x+Math.cos(ang)*100;l.y=a.y+Math.sin(ang)*100;l.vx=0;l.vy=0;nodes.push(l);idx[l.id]=l;(byC[l.cluster]=byC[l.cluster]||[]).push(l);});
 const L=[];AREAS.forEach(a=>L.push([root.id,a.id,false]));LEAVES.forEach(l=>L.push([l.cluster,l.id,false]));CROSS.forEach(x=>L.push([x[0],x[1],true]));
 const links=L.map(l=>({s:idx[l[0]],t:idx[l[1]],cross:l[2]}));
 const R={root:38,area:27,live:18};
 function rad(n){return n.cat==="root"?R.root:n.cat==="area"?R.area:R.live;}
 const lineEls=links.map(l=>{const e=document.createElementNS(NS,'line');e.setAttribute('stroke',l.cross?'#E0382A':'#16120A');e.setAttribute('stroke-width',l.cross?2.4:(l.s.cat==="root"||l.t.cat==="root")?2.2:1.7);e.setAttribute('stroke-opacity',l.cross?.55:(l.s.cat==="root"||l.t.cat==="root")?.32:.42);if(l.cross)e.setAttribute('stroke-dasharray','8 5');linkG.appendChild(e);return e;});
 nodes.forEach(n=>{
   const g=document.createElementNS(NS,'g');g.style.cursor='pointer';
   const c=document.createElementNS(NS,'circle');c.setAttribute('r',rad(n));
   if(n.cat==="root"){c.setAttribute('fill','#16120A');c.setAttribute('stroke','#16120A');c.setAttribute('stroke-width',4);}
   else if(n.cat==="area"){c.setAttribute('fill',n.color);c.setAttribute('stroke','#16120A');c.setAttribute('stroke-width',4);}
   else{c.setAttribute('fill','#F3C00E');c.setAttribute('stroke','#16120A');c.setAttribute('stroke-width',4);}
   g.appendChild(c);
   if(n.cat==="leaf"){const st=document.createElementNS(NS,'text');st.setAttribute('text-anchor','middle');st.setAttribute('y',6);st.setAttribute('font-size','17');st.setAttribute('font-weight','900');st.setAttribute('fill','#16120A');st.textContent='★';st.style.pointerEvents='none';g.appendChild(st);}
   const t=document.createElementNS(NS,'text');t.setAttribute('class','nl');t.setAttribute('text-anchor','middle');t.setAttribute('y',rad(n)+15);
   t.setAttribute('font-size',n.cat==="root"?19:n.cat==="area"?17:12.5);t.setAttribute('fill','#16120A');t.textContent=n.label;g.appendChild(t);
   nodeG.appendChild(g);n._g=g;n._c=c;n._t=t;
   g.addEventListener('pointerdown',ev=>{ev.stopPropagation();drag=n;moved=false;n._fix=true;alpha=Math.max(alpha,.7);try{g.setPointerCapture(ev.pointerId);}catch(e){}});
 });
 let view={k:0.64,tx:0,ty:0};function applyView(){scene.setAttribute('transform','translate('+view.tx+','+view.ty+') scale('+view.k+')');}
 function fit(){view.k=0.64;view.tx=cx-cx*view.k;view.ty=cy-cy*view.k;applyView();}fit();
 let alpha=1;
 function sep(a,b){const base=rad(a)+rad(b);if(a.cat==="leaf"&&b.cat==="leaf")return base+44;if(a.cat==="area"&&b.cat==="area")return base+230;return base+38;}
 function tick(){
   const N=nodes.length;
   for(let i=0;i<N;i++){const a=nodes[i];if(a.cat==="root")continue;a.vx+=(cx-a.x)*0.0011*alpha;a.vy+=(cy-a.y)*0.0011*alpha;if(a.cat==="leaf"){const ar=idx[a.cluster];a.vx+=(ar.x-a.x)*0.009*alpha;a.vy+=(ar.y-a.y)*0.009*alpha;}}
   for(let i=0;i<N;i++){const a=nodes[i];for(let j=i+1;j<N;j++){const b=nodes[j];let dx=a.x-b.x,dy=a.y-b.y;let d2=dx*dx+dy*dy;if(d2<0.01){d2=0.01;dx=Math.random()-0.5;dy=Math.random()-0.5;}
     const d=Math.sqrt(d2);const rep=8200*alpha/d2;const fx=dx/d*rep,fy=dy/d*rep;if(a.cat!=="root"){a.vx+=fx;a.vy+=fy;}if(b.cat!=="root"){b.vx-=fx;b.vy-=fy;}
     const ms=sep(a,b);if(d<ms){const push=(ms-d)*0.5;const ox=dx/d*push,oy=dy/d*push;if(!a._fix&&a.cat!=="root"){a.x+=ox;a.y+=oy;}if(!b._fix&&b.cat!=="root"){b.x-=ox;b.y-=oy;}}
   }}
   links.forEach(l=>{const a=l.s,b=l.t;let dx=b.x-a.x,dy=b.y-a.y;let d=Math.sqrt(dx*dx+dy*dy)||0.01;const rest=l.cross?320:(a.cat==="root"||b.cat==="root")?270:128;const f=(d-rest)*0.03*alpha;const fx=dx/d*f,fy=dy/d*f;if(!a._fix&&a.cat!=="root"){a.vx+=fx;a.vy+=fy;}if(!b._fix&&b.cat!=="root"){b.vx-=fx;b.vy-=fy;}});
   nodes.forEach(a=>{if(a.cat==="root"||a._fix)return;a.vx*=0.86;a.vy*=0.86;a.x+=a.vx;a.y+=a.vy;});
   if(alpha>0.04)alpha*=0.99;render();
 }
 function render(){links.forEach((l,i)=>{const e=lineEls[i];e.setAttribute('x1',l.s.x);e.setAttribute('y1',l.s.y);e.setAttribute('x2',l.t.x);e.setAttribute('y2',l.t.y);});nodes.forEach(nd=>{nd._g.setAttribute('transform','translate('+nd.x+','+nd.y+')');});}
 function loop(){tick();requestAnimationFrame(loop);}loop();
 function toWorld(clientX,clientY){const rect=svg.getBoundingClientRect();const sx=(clientX-rect.left)/rect.width*W;const sy=(clientY-rect.top)/rect.height*H;return {x:(sx-view.tx)/view.k,y:(sy-view.ty)/view.k};}
 let drag=null,moved=false,pan=null;
 svg.addEventListener('pointermove',ev=>{if(drag){moved=true;const w=toWorld(ev.clientX,ev.clientY);drag.x=w.x;drag.y=w.y;drag.vx=0;drag.vy=0;alpha=Math.max(alpha,.5);return;}if(pan){view.tx=pan.tx+(ev.clientX-pan.x);view.ty=pan.ty+(ev.clientY-pan.y);applyView();}});
 window.addEventListener('pointerup',()=>{if(drag){drag._fix=false;if(!moved)openPanel(drag);drag=null;}if(pan){pan=null;svg.classList.remove('grabbing');}});
 svg.addEventListener('pointerdown',ev=>{if(drag)return;pan={x:ev.clientX,y:ev.clientY,tx:view.tx,ty:view.ty};svg.classList.add('grabbing');});
 svg.addEventListener('wheel',ev=>{ev.preventDefault();const rect=svg.getBoundingClientRect();const mx=(ev.clientX-rect.left)/rect.width*W,my=(ev.clientY-rect.top)/rect.height*H;const f=ev.deltaY<0?1.13:0.88;const nk=Math.max(0.35,Math.min(3.5,view.k*f));view.tx=mx-(mx-view.tx)*(nk/view.k);view.ty=my-(my-view.ty)*(nk/view.k);view.k=nk;applyView();},{passive:false});
 document.getElementById('zin').onclick=()=>zb(1.2);document.getElementById('zout').onclick=()=>zb(1/1.2);
 function zb(f){const nk=Math.max(0.35,Math.min(3.5,view.k*f));view.tx=cx-(cx-view.tx)*(nk/view.k);view.ty=cy-(cy-view.ty)*(nk/view.k);view.k=nk;applyView();}
 document.getElementById('resetBtn').onclick=()=>{alpha=1;fit();};
 const panel=document.getElementById('panel'),pbody=document.getElementById('pbody');
 document.getElementById('pclose').onclick=()=>panel.classList.remove('show');
 function openPanel(d){
   const col=d.cat==="area"?d.color:d.cat==="root"?'#16120A':'#C8930E';
   const catName=d.cat==="root"?'总览':d.cat==="area"?'学科':'题型 ★';
   let h='<span class="pcat" style="background:'+col+'">'+catName+'</span><h3>'+d.label+'</h3>';
   if(d.cat==="area"){const kids=byC[d.id]||[];h+='<div class="row">已上线 <b>'+kids.length+'</b> 个攻坚包。进入查看该科完整知识图谱(更多待开发题型)。</div><a class="go" style="background:'+d.color+'" href="'+d.map+'">进入'+d.label+'知识图谱 →</a>';}
   if(d.cat==="root")h+='<div class="row">六科总入口。拖动任意节点牵动整张网;红色虚线是跨学科联系。点学科进入分科完整图谱。</div>';
   if(d.trigger)h+='<div class="trig"><b>触发信号:</b>'+d.trigger+'</div>';
   if(d.action)h+='<div class="act"><b>标准动作:</b>'+d.action+'</div>';
   if(d.pack)h+='<a class="go" style="background:'+(idx[d.cluster].color)+'" href="'+d.pack+'">打开攻坚包 →</a>';
   pbody.innerHTML=h;panel.classList.add('show');
 }
 const jwrap=document.getElementById('jumps');
 AREAS.forEach(s=>{const a=document.createElement('a');a.className='jump';a.style.background=s.color;a.href=s.map;a.textContent=s.label+'图 →';jwrap.appendChild(a);});
 const search=document.getElementById('search');
 search.addEventListener('input',()=>{const q=search.value.trim();nodes.forEach(d=>{const hit=q===''||d.label.indexOf(q)>=0;d._c.setAttribute('opacity',hit?1:0.13);d._t.setAttribute('opacity',hit?1:0.13);});});
})();
</script>
</body>
</html>
