   nodeG.appendChild(g);n._g=g;n._c=c;n._t=t;
   g.addEventListener('pointerdown',ev=>{ev.stopPropagation();drag=n;moved=false;n._fix=true;alpha=Math.max(alpha,.7);try{g.setPointerCapture(ev.pointerId);}catch(e){}});
 });
 let view={k:0.64,tx:0,ty:0};function applyView(){scene.setAttribute('transform','translate('+view.tx+','+view.ty+') scale('+view.k+')');}
 function fit(){view.k=0.64;view.tx=cx-cx*view.k;view.ty=cy-cy*view.k;applyView();}fit();
 let alpha=1;
 function sep(a,b){const base=rad(a)+rad(b);if(a.cat==="leaf"&&b.cat==="leaf")return base+44;if(a.cat==="area"&&b.cat==="area")return base+230;return base+38;}
 function tick(){
   const N=nodes.length;
   for(let i=0;i<N;i++){const a=nodes[i];if(a.cat==="root")continue;a.vx+=(cx-a.x)*0.0011*alpha;a.vy+=(cy-a.y)*0.0011*alpha;if(a.cat==="leaf"){const ar=idx[a.cluster];a.vx+=(ar.x-a.x)*0.009*alpha;a.vy+=(ar.y-a.y)*0.009*alpha;}}
   for(let i=0;i<N;i++){const a=nodes[i];for(let j=i+1;j<N;j++){const b=nodes[j];let dx=a.x-b.x,dy=a.y-b.y;let d2=dx*dx+dy*dy;if(d2<0.01){d2=0.01;dx=Math.random()-0.5;dy=Math.random()-0.5;}
     const d=Math.sqrt(d2);const rep=8200*alpha/d2;const fx=dx/d*rep,fy=dy/d*rep;if(a.cat!=="root"){a.vx+=fx;a.vy+=fy;}if(b.cat!=="root"){b.vx-=fx;b.vy-=fy;}
     const ms=sep(a,b);if(d<ms){const push=(ms-d)*0.5;const ox=dx/d*push,oy=dy/d*push;if(!a._fix&&a.cat!=="root"){a.x+=ox;a.y+=oy;}if(!b._fix&&b.cat!=="root"){b.x-=ox;b.y-=oy;}}
   }}
   links.forEach(l=>{const a=l.s,b=l.t;let dx=b.x-a.x,dy=b.y-a.y;let d=Math.sqrt(dx*dx+dy*dy)||0.01;const rest=l.cross?320:(a.cat==="root"||b.cat==="root")?270:128;const f=(d-rest)*0.03*alpha;const fx=dx/d*f,fy=dy/d*f;if(!a._fix&&a.cat!=="root"){a.vx+=fx;a.vy+=fy;}if(!b._fix&&b.cat!=="root"){b.vx-=fx;b.vy-=fy;}});
   nodes.forEach(a=>{if(a.cat==="root"||a._fix)return;a.vx*=0.86;a.vy*=0.86;a.x+=a.vx;a.y+=a.vy;});
   if(alpha>0.04)alpha*=0.99;render();
 }
 function render(){links.forEach((l,i)=>{const e=lineEls[i];e.setAttribute('x1',l.s.x);e.setAttribute('y1',l.s.y);e.setAttribute('x2',l.t.x);e.setAttribute('y2',l.t.y);});nodes.forEach(nd=>{nd._g.setAttribute('transform','translate('+nd.x+','+nd.y+')');});}
 function loop(){tick();requestAnimationFrame(loop);}loop();
 function toWorld(clientX,clientY){const rect=svg.getBoundingClientRect();const sx=(clientX-rect.left)/rect.width*W;const sy=(clientY-rect.top)/rect.height*H;return {x:(sx-view.tx)/view.k,y:(sy-view.ty)/view.k};}
 let drag=null,moved=false,pan=null;
 svg.addEventListener('pointermove',ev=>{if(drag){moved=true;const w=toWorld(ev.clientX,ev.clientY);drag.x=w.x;drag.y=w.y;drag.vx=0;drag.vy=0;alpha=Math.max(alpha,.5);return;}if(pan){view.tx=pan.tx+(ev.clientX-pan.x);view.ty=pan.ty+(ev.clientY-pan.y);applyView();}});
 window.addEventListener('pointerup',()=>{if(drag){drag._fix=false;if(!moved)openPanel(drag);drag=null;}if(pan){pan=null;svg.classList.remove('grabbing');}});
 svg.addEventListener('pointerdown',ev=>{if(drag)return;pan={x:ev.clientX,y:ev.clientY,tx:view.tx,ty:view.ty};svg.classList.add('grabbing');});
 svg.addEventListener('wheel',ev=>{ev.preventDefault();const rect=svg.getBoundingClientRect();const mx=(ev.clientX-rect.left)/rect.width*W,my=(ev.clientY-rect.top)/rect.height*H;const f=ev.deltaY<0?1.13:0.88;const nk=Math.max(0.35,Math.min(3.5,view.k*f));view.tx=mx-(mx-view.tx)*(nk/view.k);view.ty=my-(my-view.ty)*(nk/view.k);view.k=nk;applyView();},{passive:false});
 document.getElementById('zin').onclick=()=>zb(1.2);document.getElementById('zout').onclick=()=>zb(1/1.2);
 function zb(f){const nk=Math.max(0.35,Math.min(3.5,view.k*f));view.tx=cx-(cx-view.tx)*(nk/view.k);view.ty=cy-(cy-view.ty)*(nk/view.k);view.k=nk;applyView();}
 document.getElementById('resetBtn').onclick=()=>{alpha=1;fit();};
 const panel=document.getElementById('panel'),pbody=document.getElementById('pbody');
 document.getElementById('pclose').onclick=()=>panel.classList.remove('show');
 function openPanel(d){
   const col=d.cat==="area"?d.color:d.cat==="root"?'#16120A':'#C8930E';
   const catName=d.cat==="root"?'总览':d.cat==="area"?'学科':'题型 ★';
   let h='<span class="pcat" style="background:'+col+'">'+catName+'</span><h3>'+d.label+'</h3>';
   if(d.cat==="area"){const kids=byC[d.id]||[];h+='<div class="row">已上线 <b>'+kids.length+'</b> 个攻坚包。进入查看该科完整知识图谱(更多待开发题型)。</div><a class="go" style="background:'+d.color+'" href="'+d.map+'">进入'+d.label+'知识图谱 →</a>';}
   if(d.cat==="root")h+='<div class="row">六科总入口。拖动任意节点牵动整张网;红色虚线是跨学科联系。点学科进入分科完整图谱。</div>';
   if(d.trigger)h+='<div class="trig"><b>触发信号:</b>'+d.trigger+'</div>';
   if(d.action)h+='<div class="act"><b>标准动作:</b>'+d.action+'</div>';
   if(d.pack)h+='<a class="go" style="background:'+(idx[d.cluster].color)+'" href="'+d.pack+'">打开攻坚包 →</a>';
   pbody.innerHTML=h;panel.classList.add('show');
 }
 const jwrap=document.getElementById('jumps');
 AREAS.forEach(s=>{const a=document.createElement('a');a.className='jump';a.style.background=s.color;a.href=s.map;a.textContent=s.label+'图 →';jwrap.appendChild(a);});
 const search=document.getElementById('search');
 search.addEventListener('input',()=>{const q=search.value.trim();nodes.forEach(d=>{const hit=q===''||d.label.indexOf(q)>=0;d._c.setAttribute('opacity',hit?1:0.13);d._t.setAttribute('opacity',hit?1:0.13);});});
})();
</script>
</body>
