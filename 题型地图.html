<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>题型地图 · 六科知识总图 | thebest2dan</title>
<style>
  :root{--paper:#EBE4D2;--card:#F4EFE2;--ink:#16120A;--red:#E0382A;--blue:#1450C8;--yellow:#F3C00E;--green:#1E9E86;--violet:#7A3FF2;--orange:#E86A17;--pink:#C81E6E;--shadow:6px 6px 0 var(--ink);--accent:#E0382A;}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:-apple-system,"Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6}
  .topnav{position:sticky;top:0;z-index:30;background:var(--paper);border-bottom:5px solid var(--ink);display:flex;align-items:stretch;justify-content:space-between;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px;padding:12px 18px;text-decoration:none;color:var(--ink);border-right:5px solid var(--ink)}
  .logomark{width:38px;height:38px;background:var(--ink);border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}.logomark svg{width:24px;height:24px}.brand b{font-size:21px;font-weight:900;letter-spacing:-.5px}
  .links{display:flex}.links a{display:flex;align-items:center;padding:0 16px;color:var(--ink);text-decoration:none;font-size:14px;font-weight:800;border-left:3px solid var(--ink)}.links a:hover{background:var(--yellow)}
  @media(max-width:640px){.topnav{flex-direction:column}.brand{border-right:0;border-bottom:4px solid var(--ink)}.links{width:100%}.links a{flex:1;justify-content:center;padding:11px 6px;border-left:0;border-right:3px solid var(--ink)}}
  .hd{max-width:1100px;margin:0 auto;padding:16px 18px 6px}
  .kicker{display:inline-block;background:var(--accent);color:#fff;font-weight:900;font-size:12px;letter-spacing:2px;padding:5px 12px;text-transform:uppercase;border:3px solid var(--ink)}
  h1{font-size:27px;font-weight:900;letter-spacing:-1px;margin:8px 0 4px}
  .sub{font-size:14.5px;font-weight:600;max-width:780px;margin:0}
  .chipsrow{max-width:1100px;margin:10px auto 0;padding:0 18px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .jump{border:3px solid var(--ink);padding:6px 12px;font-weight:800;font-size:13px;cursor:pointer;text-decoration:none;color:#fff;box-shadow:3px 3px 0 var(--ink)}
  .toolbar{max-width:1100px;margin:8px auto 0;padding:0 18px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .toolbar input{border:3px solid var(--ink);padding:7px 11px;font-size:14px;font-weight:700;font-family:inherit;box-shadow:3px 3px 0 var(--ink);min-width:180px}
  .tbtn{background:var(--ink);color:#fff;border:3px solid var(--ink);padding:7px 13px;font-weight:800;font-size:13px;cursor:pointer;box-shadow:3px 3px 0 var(--accent)}
  .stage{position:relative;max-width:1100px;margin:12px auto;padding:0 18px}
  .canvaswrap{position:relative;border:4px solid var(--ink);box-shadow:var(--shadow);background:#FBF8EF;overflow:hidden;border-radius:4px}
  svg#graph{display:block;width:100%;height:70vh;min-height:480px;touch-action:none;cursor:grab}
  svg#graph.grabbing{cursor:grabbing}
  .hint{position:absolute;left:12px;bottom:10px;font-size:12px;font-weight:700;color:#7a6f54;background:rgba(251,248,239,.85);padding:3px 8px;border:2px solid var(--ink)}
  .zoombtns{position:absolute;right:12px;top:12px;display:flex;flex-direction:column;gap:6px}
  .zoombtns button{width:34px;height:34px;border:3px solid var(--ink);background:#fff;font-weight:900;font-size:17px;cursor:pointer;box-shadow:2px 2px 0 var(--ink)}
  .panel{position:absolute;top:12px;right:12px;width:300px;max-width:78%;background:#fff;border:4px solid var(--ink);box-shadow:var(--shadow);padding:14px 16px;display:none;z-index:5}
  .panel.show{display:block}
  .panel .pcat{display:inline-block;font-size:11px;font-weight:900;letter-spacing:1px;padding:2px 8px;border:2px solid var(--ink);color:#fff;text-transform:uppercase}
  .panel h3{font-size:19px;font-weight:900;margin:8px 0 6px}
  .panel .row{font-size:13.5px;font-weight:600;margin:7px 0}.panel .row b{font-weight:900}
  .panel .trig{border-left:8px solid var(--blue);background:#F4EFE2;border:2px solid var(--ink);padding:6px 10px;margin:6px 0}
  .panel .act{border-left:8px solid var(--green);background:#F4EFE2;border:2px solid var(--ink);padding:6px 10px;margin:6px 0}
  .panel a.go{display:inline-block;margin-top:8px;color:#fff;border:3px solid var(--ink);padding:7px 13px;font-weight:900;font-size:13px;text-decoration:none;box-shadow:3px 3px 0 var(--ink)}
  .panel .x{position:absolute;top:8px;right:10px;font-weight:900;cursor:pointer;font-size:18px;border:none;background:none}
  .node-label{font-weight:800;pointer-events:none;paint-order:stroke;stroke:#FBF8EF;stroke-width:3px;stroke-linejoin:round}
  .foot{max-width:1100px;margin:0 auto;padding:8px 18px 60px;font-size:12.5px;font-weight:700;color:#6b5d3a}
</style>
</head>
<body>
  <nav class="topnav">
    <a class="brand" href="index.html"><span class="logomark"><svg viewBox="0 0 24 24" fill="none"><g stroke="#F3C00E" stroke-width="3.4" stroke-linecap="round"><line x1="12" y1="3.5" x2="12" y2="20.5"/><line x1="3.5" y1="12" x2="20.5" y2="12"/><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></g></svg></span><b>thebest2dan</b></a>
    <div class="links"><a href="index.html">首页</a><a href="index.html#packs">攻坚包</a></div>
  </nav>
  <div class="hd">
    <div class="kicker">六科 · 知识总图</div>
    <h1>题型地图 · 六科总览</h1>
    <p class="sub">把语数英物化生六科连成一张网。拖动、缩放、点节点看详情。点学科节点进入该科的<b>完整知识图谱</b>;点 ★ 节点直达对应攻坚包。下面也可一键直达分科图。</p>
  </div>
  <div class="chipsrow" id="jumps"></div>
  <div class="toolbar">
    <input id="search" placeholder="🔍 搜学科 / 题型…" autocomplete="off">
    <button class="tbtn" id="resetBtn">复位视图</button>
    <button class="tbtn" id="freezeBtn">暂停布局</button>
  </div>
  <div class="stage">
    <div class="canvaswrap">
      <svg id="graph" viewBox="0 0 1000 700"></svg>
      <div class="zoombtns"><button id="zin">＋</button><button id="zout">－</button></div>
      <div class="hint">拖背景平移 · 滚轮缩放 · 拖节点 · 点学科进分科图</div>
      <div class="panel" id="panel"><button class="x" id="pclose">×</button><div id="pbody"></div></div>
    </div>
  </div>
  <div class="foot">thebest2dan · 六科题型总图 · 学科节点→分科知识图谱;★→可交互攻坚包</div>

<script>
const SUBJ={chem:"#1E9E86",phys:"#1450C8",bio:"#7A3FF2",math:"#E86A17",eng:"#0E9AA7",chin:"#E0382A"};
const CAT={root:"#16120A",area:"#1450C8",topic:"#F4EFE2",type:"#F3C00E"};
const GRAPH={
 nodes:[
  {id:"core",label:"六科 · 题型地图",cat:"root"},
  // subjects
  {id:"chem",label:"化学",cat:"area",color:SUBJ.chem,map:"化学地图.html"},
  {id:"phys",label:"物理",cat:"area",color:SUBJ.phys,map:"物理地图.html"},
  {id:"bio",label:"生物",cat:"area",color:SUBJ.bio,map:"生物地图.html"},
  {id:"math",label:"数学",cat:"area",color:SUBJ.math,map:"数学地图.html"},
  {id:"eng",label:"英语",cat:"area",color:SUBJ.eng,map:"英语地图.html"},
  {id:"chin",label:"语文",cat:"area",color:SUBJ.chin,map:"语文地图.html"},
  // 化学 packs
  {id:"c_eq",label:"化学平衡 ★",cat:"type",pack:"化学平衡.html",trigger:"可逆⇌、移动方向、转化率、K、图像。",action:"勒夏特列→三段式→比较Q与K;先拐先平。"},
  {id:"c_ec",label:"电化学 ★",cat:"type",pack:"电化学.html",trigger:"原电池/电解池、电极式、放电顺序、电量。",action:"判氧化还原极→按介质写电极式→电子守恒算量。"},
  {id:"c_aq",label:"水溶液离子 ★",cat:"type",pack:"水溶液离子平衡.html",trigger:"pH、水解、滴定、离子浓度、Ksp。",action:"抓电离/水解→三大守恒→比较浓度。"},
  {id:"c_org",label:"有机推断 ★",cat:"type",pack:"有机推断.html",trigger:"分子式+现象推结构、转化框图、同分异构。",action:"算不饱和度→认官能团→转化网络→数异构。"},
  {id:"c_exp",label:"实验/工艺 ★",cat:"type",pack:"化学实验.html",trigger:"滴定误差、工艺流程。",action:"V标大小判误差;流程认环节问目的。"},
  // 物理 packs
  {id:"p_em",label:"电磁感应 ★",cat:"type",pack:"电磁感应.html",trigger:"磁通变化、感应电流方向、EMF。",action:"楞次定律来拒去留→ε=NΔΦ/Δt 或 BLv。"},
  {id:"p_mp",label:"多过程/能量动量 ★",cat:"type",pack:"物理多过程.html",trigger:"碰撞/嵌入+后续运动、滑块木板。",action:"分段→选锅(动量/能量/动能定理)→速度衔接。"},
  {id:"p_ex",label:"电学实验 ★",cat:"type",pack:"物理电学实验.html",trigger:"内外接、分压限流、测电动势内阻、读数。",action:"大内偏大小外偏小;U-I图纵截距=ε斜率=r。"},
  // 生物 packs
  {id:"b_gen",label:"遗传计算 ★",cat:"type",pack:"遗传计算.html",trigger:"分离/自由组合、概率、系谱、伴性。",action:"分步分类相乘相加;系谱口诀定显隐与染色体。"},
  {id:"b_ps",label:"光合呼吸 ★",cat:"type",pack:"光合呼吸.html",trigger:"光合呼吸速率、曲线、补偿/饱和点。",action:"真光合=净光合+呼吸;限制因子判断。"},
  // 数学 packs
  {id:"m_der",label:"导数压轴 ★",cat:"type",pack:"数学压轴.html",trigger:"含参单调极值、零点、不等式证明、排列组合。",action:"求导讨论;双极值比值换元;三大法(捆绑/插空/隔板)。"},
  {id:"m_st",label:"状态转移 ★",cat:"type",pack:"数学状态转移.html",trigger:"新定义、概率递推、马尔科夫、逆向。",action:"构造等比;不动点法;正难则反用补集。"},
  // 英语 packs
  {id:"e_wr",label:"小作文 ★",cat:"type",pack:"英语作文.html",trigger:"应用文(邀请/建议/通知…)。",action:"三段骨架+高级句式+连接词。"},
  {id:"e_cont",label:"读后续写 ★",cat:"type",pack:"读后续写.html",trigger:"给短文+两段首句续写。",action:"顺情绪弧;两段承接;动作慢镜头+五感;回收伏笔。"},
  // 语文 packs
  {id:"z_bing",label:"改病句 ★",cat:"type",pack:"语文改病句.html",trigger:"辨析/修改语病。",action:"缩主干看搭配→扫陷阱词→对号入座六类型。"},
  {id:"z_zw",label:"议论文 ★",cat:"type",pack:"语文作文.html",trigger:"材料/话题作文。",action:"审题立意→凤头猪肚豹尾→分论点递进→论证+素材。"}
 ],
 links:[
  ["core","chem"],["core","phys"],["core","bio"],["core","math"],["core","eng"],["core","chin"],
  ["chem","c_eq"],["chem","c_ec"],["chem","c_aq"],["chem","c_org"],["chem","c_exp"],
  ["phys","p_em"],["phys","p_mp"],["phys","p_ex"],
  ["bio","b_gen"],["bio","b_ps"],
  ["math","m_der"],["math","m_st"],
  ["eng","e_wr"],["eng","e_cont"],
  ["chin","z_bing"],["chin","z_zw"],
  // cross-subject ties
  ["math","phys"],["chem","bio"],["eng","chin"],["m_der","p_mp"],["c_org","b_gen"]
 ]
};
(function(){
 const svg=document.getElementById('graph');
 const NS="http://www.w3.org/2000/svg";
 const scene=document.createElementNS(NS,'g');svg.appendChild(scene);
 const linkG=document.createElementNS(NS,'g');scene.appendChild(linkG);
 const nodeG=document.createElementNS(NS,'g');scene.appendChild(nodeG);
 const W=1000,H=700,cx=W/2,cy=H/2;
 const R={root:40,area:27,topic:15,type:18};
 const idx={};GRAPH.nodes.forEach(n=>idx[n.id]=n);
 GRAPH.nodes.forEach((n,i)=>{const ang=i/GRAPH.nodes.length*6.283;const rr=n.cat==="root"?0:(n.cat==="area"?170:310);n.x=cx+Math.cos(ang)*rr+(Math.random()*40-20);n.y=cy+Math.sin(ang)*rr+(Math.random()*40-20);n.vx=0;n.vy=0;});
 const links=GRAPH.links.map(l=>({s:idx[l[0]],t:idx[l[1]],cross:(idx[l[0]].cat==="area"&&idx[l[1]].cat==="area")||(l[0]==="m_der")||(l[0]==="c_org")}));
 const lineEls=links.map(l=>{const e=document.createElementNS(NS,'line');e.setAttribute('stroke',l.cross?'#E0382A':'#16120A');e.setAttribute('stroke-width',l.cross?'2.5':'2');e.setAttribute('stroke-opacity',l.cross?'.5':'.35');if(l.cross)e.setAttribute('stroke-dasharray','7 5');linkG.appendChild(e);return e;});
 const nodeEls=GRAPH.nodes.map(n=>{
   const g=document.createElementNS(NS,'g');g.style.cursor='pointer';
   const c=document.createElementNS(NS,'circle');const r=R[n.cat]||14;
   c.setAttribute('r',r);c.setAttribute('fill',n.color||CAT[n.cat]);c.setAttribute('stroke','#16120A');c.setAttribute('stroke-width',n.cat==="type"?4:3);
   g.appendChild(c);
   if(n.cat==="type"){const st=document.createElementNS(NS,'text');st.setAttribute('text-anchor','middle');st.setAttribute('y',5);st.setAttribute('font-size','14');st.setAttribute('font-weight','900');st.setAttribute('fill','#16120A');st.textContent='★';st.style.pointerEvents='none';g.appendChild(st);}
   const t=document.createElementNS(NS,'text');t.setAttribute('class','node-label');t.setAttribute('text-anchor','middle');t.setAttribute('y',(R[n.cat]||14)+15);
   t.setAttribute('font-size',n.cat==="root"?18:(n.cat==="area"?16:12));t.setAttribute('fill','#16120A');t.textContent=n.label;g.appendChild(t);
   nodeG.appendChild(g);n._g=g;n._c=c;n._t=t;return g;
 });
 let view={k:1,tx:0,ty:0};
 function applyView(){scene.setAttribute('transform','translate('+view.tx+','+view.ty+') scale('+view.k+')');}
 applyView();
 let alpha=1,frozen=false;
 function tick(){
   if(frozen)return;
   const n=GRAPH.nodes;
   for(let i=0;i<n.length;i++){const a=n[i];if(a._fix)continue;a.vx+=(cx-a.x)*0.002*alpha;a.vy+=(cy-a.y)*0.002*alpha;
     for(let j=0;j<n.length;j++){if(i===j)continue;const b=n[j];let dx=a.x-b.x,dy=a.y-b.y;let d2=dx*dx+dy*dy;if(d2<0.01){d2=0.01;dx=Math.random();dy=Math.random();}const d=Math.sqrt(d2);const rep=3000*alpha/d2;a.vx+=dx/d*rep;a.vy+=dy/d*rep;}}
   links.forEach(l=>{const a=l.s,b=l.t;let dx=b.x-a.x,dy=b.y-a.y;let d=Math.sqrt(dx*dx+dy*dy)||0.01;const rest=(a.cat==="root"||b.cat==="root")?165:(a.cat==="area"&&b.cat==="area")?260:105;const f=(d-rest)*0.02*alpha;const fx=dx/d*f,fy=dy/d*f;if(!a._fix){a.vx+=fx;a.vy+=fy;}if(!b._fix){b.vx-=fx;b.vy-=fy;}});
   n.forEach(a=>{if(a._fix)return;a.vx*=0.86;a.vy*=0.86;a.x+=a.vx;a.y+=a.vy;});
   alpha*=0.992;if(alpha<0.02)alpha=0.02;render();
 }
 function render(){links.forEach((l,i)=>{const e=lineEls[i];e.setAttribute('x1',l.s.x);e.setAttribute('y1',l.s.y);e.setAttribute('x2',l.t.x);e.setAttribute('y2',l.t.y);});GRAPH.nodes.forEach(nd=>{nd._g.setAttribute('transform','translate('+nd.x+','+nd.y+')');});}
 function loop(){tick();requestAnimationFrame(loop);}loop();
 function toWorld(clientX,clientY){const rect=svg.getBoundingClientRect();const sx=(clientX-rect.left)/rect.width*W;const sy=(clientY-rect.top)/rect.height*H;return {x:(sx-view.tx)/view.k,y:(sy-view.ty)/view.k};}
 let drag=null,moved=false;
 nodeEls.forEach((g,i)=>{const nd=GRAPH.nodes[i];
   g.addEventListener('pointerdown',ev=>{ev.stopPropagation();drag=nd;moved=false;nd._fix=true;alpha=0.6;g.setPointerCapture(ev.pointerId);});
   g.addEventListener('pointermove',ev=>{if(drag!==nd)return;moved=true;const w=toWorld(ev.clientX,ev.clientY);nd.x=w.x;nd.y=w.y;nd.vx=0;nd.vy=0;render();});
   g.addEventListener('pointerup',ev=>{if(drag===nd){nd._fix=false;drag=null;if(!moved)openPanel(nd);}});
 });
 let pan=null;
 svg.addEventListener('pointerdown',ev=>{pan={x:ev.clientX,y:ev.clientY,tx:view.tx,ty:view.ty};svg.classList.add('grabbing');});
 svg.addEventListener('pointermove',ev=>{if(!pan)return;view.tx=pan.tx+(ev.clientX-pan.x);view.ty=pan.ty+(ev.clientY-pan.y);applyView();});
 window.addEventListener('pointerup',()=>{pan=null;svg.classList.remove('grabbing');});
 svg.addEventListener('wheel',ev=>{ev.preventDefault();const rect=svg.getBoundingClientRect();const mx=(ev.clientX-rect.left)/rect.width*W,my=(ev.clientY-rect.top)/rect.height*H;const f=ev.deltaY<0?1.12:0.89;const nk=Math.max(0.4,Math.min(3,view.k*f));view.tx=mx-(mx-view.tx)*(nk/view.k);view.ty=my-(my-view.ty)*(nk/view.k);view.k=nk;applyView();},{passive:false});
 document.getElementById('zin').onclick=()=>zoomBtn(1.2);
 document.getElementById('zout').onclick=()=>zoomBtn(1/1.2);
 function zoomBtn(f){const nk=Math.max(0.4,Math.min(3,view.k*f));view.tx=cx-(cx-view.tx)*(nk/view.k);view.ty=cy-(cy-view.ty)*(nk/view.k);view.k=nk;applyView();}
 document.getElementById('resetBtn').onclick=()=>{view={k:1,tx:0,ty:0};applyView();alpha=0.8;};
 const fb=document.getElementById('freezeBtn');fb.onclick=()=>{frozen=!frozen;fb.textContent=frozen?'继续布局':'暂停布局';};
 const panel=document.getElementById('panel'),pbody=document.getElementById('pbody');
 document.getElementById('pclose').onclick=()=>panel.classList.remove('show');
 function openPanel(nd){
   const catName={root:'总览',area:'学科',topic:'知识点',type:'题型 ★'}[nd.cat];
   const col=nd.color||(nd.cat==="type"?"#1E9E86":CAT[nd.cat]==="#F4EFE2"?"#9a8f74":CAT[nd.cat]);
   let h='<span class="pcat" style="background:'+col+'">'+catName+'</span>';
   h+='<h3>'+nd.label.replace(' ★','')+'</h3>';
   if(nd.trigger)h+='<div class="trig"><b>触发信号:</b>'+nd.trigger+'</div>';
   if(nd.action)h+='<div class="act"><b>标准动作:</b>'+nd.action+'</div>';
   if(nd.map)h+='<div class="row">进入该科<b>完整知识图谱</b>,查看全部题型与知识点。</div><a class="go" style="background:'+col+'" href="'+nd.map+'">进入'+nd.label+'知识图谱 →</a>';
   if(nd.pack)h+='<a class="go" style="background:'+col+'" href="'+nd.pack+'">打开攻坚包 →</a>';
   if(nd.cat==="root")h+='<div class="row" style="color:#7a6f54">这是六科总入口。点任一学科进入它的知识图谱;红色虚线是跨学科联系。</div>';
   pbody.innerHTML=h;panel.classList.add('show');
 }
 // jump chips
 const jwrap=document.getElementById('jumps');
 [["化学","化学地图.html",SUBJ.chem],["物理","物理地图.html",SUBJ.phys],["生物","生物地图.html",SUBJ.bio],["数学","数学地图.html",SUBJ.math],["英语","英语地图.html",SUBJ.eng],["语文","语文地图.html",SUBJ.chin]].forEach(s=>{const a=document.createElement('a');a.className='jump';a.style.background=s[2];a.href=s[1];a.textContent=s[0]+'图 →';jwrap.appendChild(a);});
 const search=document.getElementById('search');
 search.addEventListener('input',()=>{const q=search.value.trim();GRAPH.nodes.forEach(nd=>{const hit=q===''||nd.label.indexOf(q)>=0;nd._c.setAttribute('opacity',hit?1:0.18);nd._t.setAttribute('opacity',hit?1:0.18);if(q&&hit){nd._c.setAttribute('stroke','#E0382A');nd._c.setAttribute('stroke-width','5');}else{nd._c.setAttribute('stroke','#16120A');nd._c.setAttribute('stroke-width',nd.cat==="type"?4:3);}});});
})();
</script>
</body>
</html>
